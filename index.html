<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>NormOS v3.1</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/boot.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/windows.css" />
  <link rel="stylesheet" href="css/apps.css" />
  <link rel="stylesheet" href="css/apps_new.css" />
  <link rel="stylesheet" href="css/apps_extra.css" />
  <link rel="stylesheet" href="css/banking_companies.css" />
</head>
<body>

  <!-- Boot screen -->
  <div id="boot-screen">
    <div class="boot-logo">NORM<span>OS</span></div>
    <div class="boot-subtitle">Personal Computing for the Slightly Confused</div>
    <div id="boot-log"></div>
    <div class="boot-progress-wrap">
      <div class="boot-progress-bar"><div id="boot-fill"></div></div>
      <div id="boot-status-text" class="boot-status">Initializing...</div>
    </div>
  </div>

  <!-- Login screen -->
  <div id="login-screen">
    <div id="login-clock"></div>
    <div id="login-date"></div>
    <div class="login-card">
      <div class="login-avatar">👤</div>
      <div class="login-username" id="login-display-name">NormOS v4.0</div>
    </div>
    <div class="login-footer">NormOS v4.0 — Account system. Credit scores. Real consequences.</div>
  </div>

  <!-- Desktop -->
  <div id="desktop">
    <div class="desktop-bg" id="desktop-bg"></div>
    <div id="desktop-icons"></div>
    <div id="desktop-widgets"></div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="start-btn">⬡ NORM</button>
    <div id="taskbar-windows"></div>
    <div id="taskbar-tray">
      <span class="tray-icon" id="tray-status" title="Status" style="display:none;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.68rem;cursor:pointer;"></span>
      <span class="tray-icon" id="tray-net"     title="NormNet — Click to open Leaderboard">📡</span>
      <span class="tray-icon" id="tray-sound"   title="Audio">🔊</span>
      <span class="tray-icon" id="tray-battery" title="Power">🔋</span>
      <span class="tray-icon" id="tray-notifs"  title="Notifications (0)">🔔</span>
      <div id="taskbar-clock"></div>
    </div>
  </div>

  <!-- Start menu -->
  <div id="start-menu">
    <div class="sm-header">
      <input class="sm-search" id="sm-search" type="text" placeholder="Search NormOS..." />
    </div>
    <div class="sm-section-label">PINNED APPS</div>
    <div class="sm-apps" id="sm-apps-list"></div>
    <div class="sm-section-label">RECENT</div>
    <div id="sm-recent"></div>
    <div class="sm-footer">
      <button class="sm-footer-btn" id="sm-settings-btn">⚙ Settings</button>
      <button class="sm-footer-btn" id="sm-shutdown-btn">⏻ Shut Down</button>
    </div>
  </div>

  <!-- System overlays -->
  <div id="context-menu"></div>
  <div id="window-layer"></div>
  <div id="notification-container"></div>
  <div id="shutdown-overlay">
    <div class="shutdown-text">Shutting down NormOS...</div>
    <div class="shutdown-sub">Please wait while NormOS pretends to save your files.</div>
  </div>

  <!-- Core JS -->
  <script src="js/utils.js"></script>
  <script src="js/filesystem.js"></script>
  <script src="js/eventmanager.js"></script>
  <script src="js/windowmanager.js"></script>
  <script src="js/commandhandler.js"></script>
  <script src="js/network.js"></script>

  <!-- Apps -->
  <script src="apps/terminal.js"></script>
  <script src="apps/fileexplorer.js"></script>
  <script src="apps/browser.js"></script>
  <script src="apps/chat.js"></script>
  <script src="apps/paint.js"></script>
  <script src="apps/normsheet.js"></script>
  <script src="apps/calculator.js"></script>
  <script src="apps/clock.js"></script>
  <script src="apps/music.js"></script>
  <script src="apps/calendar.js"></script>
  <script src="apps/imagedrop.js"></script>
  <script src="apps/texteditor.js"></script>
  <script src="apps/stocks.js"></script>
  <script src="apps/sysmon.js"></script>
  <script src="apps/leaderboard.js"></script>

  <!-- v4.0 apps -->
  <script src="apps/normtok.js"></script>
  <script src="apps/friends.js"></script><!-- Social (merged Profile+Friends+Messaging) -->
  <script src="apps/loans.js"></script>  <!-- Central Bank -->
  <script src="apps/miner.js"></script>
  <script src="apps/casino.js"></script>
  <script src="apps/settings.js"></script>
  <script src="apps/appstore.js"></script><!-- Merged Hub+Shop -->
  <!-- Browser page additions (after browser.js) -->
  <script src="apps/browser_pages.js"></script>
  <!-- v5.0 apps: Multi-Bank System + Player Companies -->
  <script src="apps/banking.js"></script>
  <script src="apps/companies.js"></script>

  <!-- Stubs for removed/upcoming apps (prevents crashes) -->
  <script>
    // Removed apps — stub so any old references don't crash
    const MailApp     = { create: () => { const d=document.createElement('div'); d.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:1rem;flex-direction:column;gap:8px;'; d.innerHTML='<div style="font-size:2rem">💬</div><div>NormMail removed — use Messaging in Social app</div>'; return d; }};
    const NotepadApp  = { create: () => { const d=document.createElement('div'); d.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:1rem;flex-direction:column;gap:8px;'; d.innerHTML='<div style="font-size:2rem">✏️</div><div>Use NormEdit instead</div><button onclick="OS.apps.open(\'texteditor\')" style="margin-top:8px;padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:5px;cursor:pointer">Open NormEdit</button>'; return d; }};
    const NewsApp     = { create: () => { const d=document.createElement('div'); d.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);flex-direction:column;gap:8px;'; d.innerHTML='<div style="font-size:2rem">📰</div><div>NormNews — Coming Soon</div>'; return d; }};
    const SnakeApp    = { create: () => { const d=document.createElement('div'); d.style.cssText='display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);flex-direction:column;gap:8px;'; d.innerHTML='<div style="font-size:2rem">🐍</div><div>Snake — Coming Soon</div>'; return d; }};
    const ShopApp     = AppStoreApp; // Shop redirects to hub
  </script>

  <!-- Economy + OS (must be last) -->
  <script src="js/economy.js"></script>
  <script src="js/os.js"></script>
  <!-- Terminal command additions (after CMD is created) -->
  <script src="js/terminal_commands.js"></script>

</body>
</html>
