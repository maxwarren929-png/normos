<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>NormOS v2.0</title>
  <link rel="stylesheet" href="css_base.css" />
  <link rel="stylesheet" href="css_boot.css" />
  <link rel="stylesheet" href="css_desktop.css" />
  <link rel="stylesheet" href="css_windows.css" />
  <link rel="stylesheet" href="css_apps.css" />
  <link rel="stylesheet" href="css_apps_new.css" />
  <link rel="stylesheet" href="css_apps_extra.css" />
</head>
<body>
  <div id="boot-screen">
    <div class="boot-logo">NORM<span>OS</span></div>
    <div class="boot-subtitle">Personal Computing for the Slightly Confused</div>
    <div id="boot-log"></div>
    <div class="boot-progress-wrap">
      <div class="boot-progress-bar"><div id="boot-fill"></div></div>
      <div id="boot-status-text" class="boot-status">Initializing...</div>
    </div>
  </div>
  <div id="login-screen">
    <div id="login-clock"></div>
    <div id="login-date"></div>
    <div class="login-card">
      <div class="login-avatar">👤</div>
      <div class="login-username" id="login-display-name">Norm</div>
      <input class="login-input" type="password" id="login-pw" placeholder="Password" autocomplete="off" />
      <button class="login-btn" id="login-btn">Sign In →</button>
      <div class="login-hint">Hint: "norm" or just Enter</div>
    </div>
    <div class="login-footer">NormOS v2.0 — More apps. More confusion. More lore.</div>
  </div>
  <div id="desktop">
    <div class="desktop-bg" id="desktop-bg"></div>
    <div id="desktop-icons"></div>
    <div id="desktop-widgets"></div>
  </div>
  <div id="taskbar">
    <button id="start-btn">⬡ NORM</button>
    <div id="taskbar-windows"></div>
    <div id="taskbar-tray">
      <span class="tray-icon" id="tray-net" title="NormNet">📡</span>
      <span class="tray-icon" id="tray-sound" title="Audio">🔊</span>
      <span class="tray-icon" id="tray-battery" title="Power">🔋</span>
      <span class="tray-icon" id="tray-notifs" title="Notifications (0)">🔔</span>
      <div id="taskbar-clock"></div>
    </div>
  </div>
  <div id="start-menu">
    <div class="sm-header">
      <input class="sm-search" id="sm-search" type="text" placeholder="Search NormOS..." />
    </div>
    <div class="sm-section-label">PINNED APPS</div>
    <div class="sm-apps" id="sm-apps-list"></div>
    <div class="sm-section-label">RECENT</div>
    <div id="sm-recent"></div>
    <div class="sm-footer">
      <button class="sm-footer-btn" id="sm-settings-btn">⚙ Settings</button>
      <button class="sm-footer-btn" id="sm-shutdown-btn">⏻ Shut Down</button>
    </div>
  </div>
  <div id="context-menu"></div>
  <div id="window-layer"></div>
  <div id="notification-container"></div>
  <div id="shutdown-overlay">
    <div class="shutdown-text">Shutting down NormOS...</div>
    <div class="shutdown-sub">Please wait while NormOS pretends to save your files.</div>
  </div>

  <script src="js_utils.js"></script>
  <script src="js_filesystem.js"></script>
  <script src="js_eventmanager.js"></script>
  <script src="js_windowmanager.js"></script>
  <script src="js_commandhandler.js"></script>
  <script src="js_network.js"></script>
  <script src="apps_terminal.js"></script>
  <script src="apps_fileexplorer.js"></script>
  <script src="apps_browser.js"></script>
  <script src="apps_notepad.js"></script>
  <script src="apps_mail.js"></script>
  <script src="apps_news.js"></script>
  <script src="apps_settings.js"></script>
  <script src="apps_snake.js"></script>
  <script src="apps_apps_chat.js"></script>
  <script src="apps_apps_paint.js"></script>
  <script src="apps_apps_normsheet.js"></script>
  <script src="apps_calculator.js"></script>
  <script src="apps_clock.js"></script>
  <script src="apps_music.js"></script>
  <script src="apps_calender.js"></script>
  <script src="apps_imagedrop.js"></script>
  <script src="apps_texteditor.js"></script>
  <script src="apps_stocks.js"></script>
  <script src="js_economy.js"></script>
  <script src="js_os.js"></script>
</body>
</html>
